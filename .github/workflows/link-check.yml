name: Check links

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday
  pull_request:
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          # 403/429: many provider sites block CI bots; a block is not a dead link
          args: --no-progress --accept '200..=299,403,429' README.md
          fail: true
